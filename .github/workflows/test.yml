name: Tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # [cli] extra pulls in python-dotenv, required for octo.config import
        run: pip install -e ".[cli]" pytest pytest-asyncio anyio

      - name: Run tests
        run: pytest tests/ -v --tb=short
